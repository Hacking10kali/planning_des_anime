    # ── Install Playwright browser ────────────
name: Scrape Anime Planning

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright aiohttp firebase-admin
        python -m playwright install chromium
        python -m playwright install-deps

    - name: Run scraper
      env:
        ANIME_SAMA_URL: https://anime-sama.to
        OUTPUT_DIR: ./anime_planning_output
        HEADLESS: true
        LOG_LEVEL: INFO
      run: |
        python scraper_planning.py

    - name: Upload planning data as artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: anime-planning-${{ github.run_number }}
        path: anime_planning_output/*

    - name: Commit and push if changed
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add anime_planning_output/
        git diff --quiet && git diff --staged --quiet || (
          git commit -m "Update anime planning"
          git push
        )
